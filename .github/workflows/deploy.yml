on:
  push:
    branches:
      - main
name: 🚀 Deploy Website on Push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v3

    - name: 🔐 Sync Core (kopetcodeigniter)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: masterprogram_ci4/
        server-dir: kopetcodeigniter/
        timeout: 600000
        state-name: .ftp-deploy-sync-state-core.json
        exclude: |
          **/.git*
          **/.git*/**
          .env

    - name: 🌐 Sync Public (Subdomain)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: public_html/waskitho.suaramadiun.com/
        timeout: 600000
        state-name: .ftp-deploy-sync-state-public.json
        exclude: |
          **/.git*
          **/.git*/**
          masterprogram_ci4/**
          .env
